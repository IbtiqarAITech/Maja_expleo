name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile scripts/*.py tools/agents/*.py
      - run: pytest -q
      - run: python scripts/build_reports.py
      - name: Validate generated PDFs
        run: |
          test -s deliverables/WP_02_Analyse_Besoins_Etude_Faisabilite.pdf
          test -s deliverables/Audit_Detaille_Amelioration_MAJA_ENSO.pdf
          python - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path("deliverables/pdf-validation.json").read_text())
          assert len(data) == 2
          assert all(item["size"] > 1000 and item["page_count"] > 0 for item in data)
          PY
      - name: Upload generated PDF deliverables
        uses: actions/upload-artifact@v4
        with:
          name: wp02-maja-pdf-deliverables
          path: |
            deliverables/WP_02_Analyse_Besoins_Etude_Faisabilite.pdf
            deliverables/Audit_Detaille_Amelioration_MAJA_ENSO.pdf
          if-no-files-found: error
      - run: |
          if command -v shellcheck >/dev/null; then shellcheck *.sh; else echo "shellcheck unavailable"; fi
